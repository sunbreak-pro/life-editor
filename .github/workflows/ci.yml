name: CI — live stack (web + shared)

# 生きている本流（shared → web）の型検査・テスト・ビルドを自動検証する。
# 旧 Tauri スタック（frontend/ + src-tauri/ + 旧 build.yml）は 2026-07-11 に削除済み
# （#197・復元 = git tag pre-tauri-removal）。Phase 3 の desktop / Phase 4 の mobile は
# 未着手のため当面ここには含めない。
#
# 検証済みの手順をそのまま写したもの（2026-06-20 ローカル実測: shared 491 tests 緑 /
# web vite build 緑）。手元で再現するには ai-context.md §6 のコマンドを参照。

on:
  pull_request:
  push:
    branches: [main]

# 同一ブランチで新しい push が来たら古い実行はキャンセル（無駄な並走を防ぐ）
concurrency:
  group: ci-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # docs 整合の機械検査（#173）。検査内容の正本 = scripts/docs-lint.sh
  # （相対リンク実在 / 旧トークン残存 / plans Status enum / 完了プラン残置）
  docs-lint:
    name: docs-lint (.claude docs consistency)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run docs-lint
        run: bash scripts/docs-lint.sh

  verify:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            shared/package-lock.json
            web/package-lock.json

      # shared = React コード本体: 型検査(tsc -b) + vitest
      - name: shared — install
        run: npm ci
        working-directory: shared
      - name: shared — build (tsc -b)
        run: npm run build
        working-directory: shared
      - name: shared — test (vitest)
        run: npm run test
        working-directory: shared

      # web = ブラウザ renderer: 型検査(tsc -b --force) + vite build
      # 上で shared を build 済み・node_modules 導入済みのため web から参照解決できる
      - name: web — install
        run: npm ci
        working-directory: web
      - name: web — build (tsc -b --force && vite build)
        run: npm run build
        working-directory: web
