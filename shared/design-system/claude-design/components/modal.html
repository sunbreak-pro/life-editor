<!-- @dsCard group="Components" -->
<!doctype html><html lang='en'><head><meta charset='utf-8'><style>
:root{
--bg:#fafafa;--bg-2:#f1f1f3;--page:#f5f5f6;
--text:#1a1a1f;--text-2:#5c5c66;
--border:#e3e3e7;--border-strong:#cfcfd6;
--accent:#1d4ed8;--accent-hover:#1e40af;--on-accent:#ffffff;
--font:ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
*{box-sizing:border-box}
body{margin:0;padding:28px;background:var(--page);color:var(--text);font-family:var(--font)}
h1{font-size:15px;font-weight:600;margin:0 0 4px}
p.sub{margin:0 0 22px;color:var(--text-2);font-size:12px}
.stage{position:relative;height:300px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg)}
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
.panel{width:360px;max-width:calc(100% - 32px);background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 32px rgba(15,18,40,.18),0 2px 6px rgba(15,18,40,.10);padding:20px}
.panel h2{font-size:15px;font-weight:600;margin:0 0 8px;color:var(--text)}
.panel p.body{font-size:13px;line-height:1.5;margin:0;color:var(--text-2)}
.footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;height:34px;padding:0 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent}
.secondary{background:var(--bg-2);color:var(--text);border-color:var(--border)}
.secondary:hover{background:#e9e9ec}
.primary{background:var(--accent);color:var(--on-accent)}
.primary:hover{background:var(--accent-hover)}
</style></head><body>
<h1>Modal / Dialog</h1>
<p class='sub'>Dimmed backdrop (rgba(0,0,0,.3)) · centered opaque panel 360px · radius 12 · secondary + primary footer</p>
<div class='stage'>
  <div class='backdrop'>
    <div class='panel' role='dialog' aria-modal='true' aria-labelledby='dlg-t'>
      <h2 id='dlg-t'>Delete this task?</h2>
      <p class='body'>This task and its 3 subtasks will be moved to Trash. You can restore them within 30 days from the Trash view.</p>
      <div class='footer'>
        <button class='btn secondary'>Cancel</button>
        <button class='btn primary'>Move to Trash</button>
      </div>
    </div>
  </div>
</div>
</body></html>
