<!-- @dsCard group="Components" -->
<!doctype html>
<html lang='en'><head><meta charset='utf-8'><style>
:root{--bg:#fafafa;--bg-2:#f1f1f3;--text:#1a1a1f;--text-2:#5c5c66;--border:#e3e3e7;--accent:#1d4ed8;--on-accent:#fff;--danger:#d92d20;--mint:#1fa56e;--mint-bg:#daf3e7;--mint-fg:#0c6f4e;--font:ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
*{box-sizing:border-box}
body{margin:0;padding:28px;background:#f5f5f6;color:var(--text);font-family:var(--font)}
h1{font-size:15px;font-weight:600;margin:0 0 4px}
p.sub{margin:0 0 22px;color:var(--text-2);font-size:12px}
table{border-collapse:separate;border-spacing:14px 12px}
th{font-size:11px;font-weight:500;color:var(--text-2);text-align:left;text-transform:uppercase;letter-spacing:.04em}
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:6px;font-weight:500;font-family:inherit;cursor:pointer}
.primary{background:var(--accent);color:var(--on-accent)}
.secondary{background:var(--bg-2);color:var(--text)}
.mint{background:var(--mint-bg);color:var(--mint-fg)}
.ghost{background:transparent;color:var(--text)}
.danger{background:var(--danger);color:var(--on-accent)}
.sm{height:28px;padding:0 10px;font-size:12px;gap:4px}
.md{height:36px;padding:0 14px;font-size:14px;gap:6px}
.lg{height:44px;padding:0 20px;font-size:16px;gap:8px}
.disabled{opacity:.5;cursor:not-allowed}
.dot{width:13px;height:13px;border-radius:3px;background:currentColor;opacity:.85}
</style></head><body>
<h1>Button</h1>
<p class='sub'>5 variants x 3 sizes - lumen-* tokens - rounded-md (6px) - font-medium - primary=cobalt, mint=secondary accent</p>
<table>
<tr><th></th><th>sm</th><th>md</th><th>lg</th></tr>
<tr><th>primary</th><td><button class='btn primary sm'>Button</button></td><td><button class='btn primary md'>Button</button></td><td><button class='btn primary lg'>Button</button></td></tr>
<tr><th>secondary</th><td><button class='btn secondary sm'>Button</button></td><td><button class='btn secondary md'>Button</button></td><td><button class='btn secondary lg'>Button</button></td></tr>
<tr><th>mint</th><td><button class='btn mint sm'>Button</button></td><td><button class='btn mint md'>Button</button></td><td><button class='btn mint lg'>Button</button></td></tr>
<tr><th>ghost</th><td><button class='btn ghost sm'>Button</button></td><td><button class='btn ghost md'>Button</button></td><td><button class='btn ghost lg'>Button</button></td></tr>
<tr><th>danger</th><td><button class='btn danger sm'>Button</button></td><td><button class='btn danger md'>Button</button></td><td><button class='btn danger lg'>Button</button></td></tr>
<tr><th>states</th><td><button class='btn primary sm disabled'>Disabled</button></td><td><button class='btn secondary md'><span class='dot'></span>Icon</button></td><td><button class='btn primary lg'><span class='dot'></span>Leading icon</button></td></tr>
</table>
</body></html>
