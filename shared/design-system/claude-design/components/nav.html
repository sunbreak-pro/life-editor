<!-- @dsCard group="Components" -->
<!doctype html><html lang='en'><head><meta charset='utf-8'><style>
:root{
--bg:#fafafa;--bg-2:#f1f1f3;--text:#1a1a1f;--text-2:#5c5c66;--border:#e3e3e7;
--accent:#1f4fff;--accent-subtle:#e1e6fb;
--hover:#e8e8ec;
--mint:#1fa56e;--mint-fg:#0c6f4e;
--font:ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
*{box-sizing:border-box}
body{margin:0;padding:28px;background:#f5f5f6;color:var(--text);font-family:var(--font)}
h1{font-size:15px;font-weight:600;margin:0 0 4px}
p.sub{margin:0 0 22px;color:var(--text-2);font-size:12px}
.sidebar{width:200px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:8px 6px;display:flex;flex-direction:column;gap:2px}
.nav{position:relative;display:flex;align-items:center;gap:10px;height:34px;padding:0 10px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer}
.nav .ico{width:14px;height:14px;border-radius:4px;border:1.5px solid currentColor;opacity:.8;flex:none}
.nav .tag{margin-left:auto;font-size:10px;font-weight:500;color:#9a9aa3}
.nav.hover{background:var(--hover);color:var(--text)}
.nav.selected{background:var(--accent-subtle);color:var(--accent);font-weight:600}
.nav.selected::before{content:'';position:absolute;left:-6px;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
.nav.selected .ico{opacity:1}
.nav.mint{color:var(--mint-fg)}
.nav.mint .dot{width:8px;height:8px;border-radius:50%;background:var(--mint);flex:none;margin-left:3px;margin-right:3px}
</style></head><body>
<h1>Sidebar Nav</h1>
<p class='sub'>Nav item states — default · hover · selected (cobalt indicator) · mint accent</p>
<nav class='sidebar'>
  <div class='nav'><span class='ico'></span>Schedule<span class='tag'>default</span></div>
  <div class='nav hover'><span class='ico'></span>Materials<span class='tag'>hover</span></div>
  <div class='nav selected'><span class='ico'></span>Work<span class='tag'>selected</span></div>
  <div class='nav'><span class='ico'></span>Notes<span class='tag'>default</span></div>
  <div class='nav mint'><span class='dot'></span>Habits<span class='tag'>mint</span></div>
</nav>
</body></html>
