appId: com.life-editor.app
productName: Life Editor

directories:
  output: release
  buildResources: build

# electron-vite output. The renderer is web/index.html bundled into out/renderer.
files:
  - out/**/*
  - package.json

# Unsigned for Phase 1-5 ($0 policy). Signing/notarization is decided after
# completion (see migration SSOT §8). identity: null disables macOS code signing.
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  identity: null

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  # Unsigned: SmartScreen "More info -> Run anyway" until a cert is purchased.

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
